services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bobobox
      POSTGRES_PASSWORD: bobobox
      POSTGRES_DB: bobobox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass bobobox
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
